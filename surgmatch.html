@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}

@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.fu{animation:fadeUp .65s cubic-bezier(.22,1,.36,1) both}
.fi{animation:fadeIn .5s ease both}
.si{animation:scaleIn .5s cubic-bezier(.22,1,.36,1) both}

.ticker-wrap{overflow:hidden;width:100%}
.ticker-track{display:flex;width:max-content;animation:ticker 30s linear infinite}
.ticker-track:hover{animation-play-state:paused}

.ring-anim{animation:drawRing 1.1s cubic-bezier(.22,1,.36,1) both;animation-delay:.2s}

.card-hover{transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s ease}
.card-hover:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.35),0 0 0 1px rgba(39,171,131,.12)}

.chk{position:relative;cursor:pointer;display:flex;align-items:center;gap:10px}
.chk input{position:absolute;opacity:0;width:0;height:0}
.chk .box{width:18px;height:18px;border:1.5px solid #486581;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.chk input:checked+.box{background:#27ab83;border-color:#27ab83}
.chk:hover .box{border-color:#65d6ad}

function inferProcedures(sub,syms){
  const m=PROC_MAP[sub];if(!m)return[{code:'99999',name:'General Consultation',sub:sub}];
  const s=syms.map(x=>x.toLowerCase());const p=[];
  // Ophthalmology
  if(sub==='glaucoma'){const mf=s.some(x=>x.includes('not controlling'));const sv=s.some(x=>x.includes('tunnel')||x.includes('sudden vision'));const hp=s.some(x=>x.includes('iop')||x.includes('>21'));if(sv)p.push(m.severe);if(mf&&!sv)p.push(m.migs);if(hp&&sv)p.push(m.shunt);if(!p.length)p.push(m.default);}
  else if(sub==='cataract'){p.push(s.some(x=>x.includes('double')||x.includes('frequent'))?m.complex:m.default);}
  else if(sub==='retina'){const d=s.some(x=>x.includes('shadow')||x.includes('curtain')||x.includes('sudden'));const f=s.some(x=>x.includes('floater')||x.includes('flash'));if(d)p.push(m.detachment);else if(f)p.push(m.vitrectomy);else p.push(m.default);}
  else if(sub==='cornea'){p.push(s.some(x=>x.includes('scarring')||x.includes('injury'))?m.transplant:m.default);}
  else if(sub==='oculoplastics'){p.push(s.some(x=>x.includes('inward')||x.includes('outward'))?m.entropion:m.default);}
  // Urology
  else if(sub==='uro_oncology'){const kid=s.some(x=>x.includes('kidney mass'));const blad=s.some(x=>x.includes('bladder mass'));if(kid)p.push(m.kidney);else if(blad)p.push(m.bladder);else p.push(m.default);}
  else if(sub==='uro_stones'){p.push(s.some(x=>x.includes('recurrent')||x.includes('known kidney'))?m.perc:m.default);}
  else if(sub==='uro_bph'){const ret=s.some(x=>x.includes('retention'));const sev=s.some(x=>x.includes('weak')||x.includes('straining'));if(ret)p.push(m.laser);else if(sev)p.push(m.default);else p.push(m.rezum);}
  else if(sub==='uro_reconstruct'){p.push(s.some(x=>x.includes('fistula'))?m.fistula:m.default);}
  // Orthopedics
  else if(sub==='ortho_joint'){const hip=s.some(x=>x.includes('hip'));const rev=s.some(x=>x.includes('revision')||x.includes('prior partial'));if(rev)p.push(m.revision);else if(hip)p.push(m.hip);else p.push(m.default);}

function matchSurgeons(sub,syms,state,urgency,insurance){
  const procs=inferProcedures(sub,syms);
  const codes=procs.map(p=>p.code);
  const subs=[...new Set(procs.map(p=>p.sub))];
  return SURGEONS.map(doc=>{
    if(state&&!doc.states.includes(state))return{...doc,score:0,dq:true,dqReason:'Not licensed in '+state,procs,breakdown:{},reasons:[]};
    const tc=codes.reduce((s,c)=>s+(doc.procedures[c]||0),0);
    if(tc===0)return{...doc,score:0,dq:true,dqReason:'No experience with required procedures',procs,breakdown:{},reasons:[]};
    const vs=Math.min(tc/500,1)*100;
    const cs=(1-doc.compRate)*100;
    const sm=subs.filter(s=>doc.subspecialties.includes(s)).length/subs.length;
    const ss=sm*100;
    const rs=(doc.rating/5)*100;
    let bonus=0;const reasons=[];
    if(urgency==='emergency'&&tc>200){bonus+=6;reasons.push('High-volume for urgent cases');}
    if(insurance==='Medicare'&&doc.medicarePatients>4000){bonus+=4;reasons.push('Extensive Medicare experience');}
    if(sm===1)reasons.unshift('Full subspecialty match');else if(sm>0)reasons.push('Partial subspecialty coverage');
    if(tc>=300)reasons.push(tc+'+ relevant cases');
    if(doc.compRate<=0.02)reasons.push('Exceptionally low complication rate');
    if(doc.rating>=4.8)reasons.push('Top-rated by peers');
    const score=(.35*vs)+(.25*cs)+(.25*ss)+(.15*rs)+bonus;
    return{...doc,score:Math.round(score*10)/10,dq:false,dqReason:'',procs,matchedCases:tc,breakdown:{volume:Math.round(vs),complications:Math.round(cs),subspecialty:Math.round(ss),rating:Math.round(rs)},reasons};
  }).filter(d=>!d.dq).sort((a,b)=>b.score-a.score);
}

function ScoreRing({score,size=80}){
  const r=(size-8)/2,c=2*Math.PI*r,o=c-(score/100)*c;
  const col=score>=85?'#27ab83':score>=65?'#f0b429':'#e12d39';
  return(
    <svg width={size} height={size} className="block flex-shrink-0">
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1a3550" strokeWidth="4"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth="4" strokeDasharray={c} strokeDashoffset={o} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} className="ring-anim" style={{strokeDashoffset:o}}/>
      <text x={size/2} y={size/2-5} textAnchor="middle" fill={col} fontSize="18" fontWeight="700" fontFamily="DM Sans">{Math.round(score)}</text>
      <text x={size/2} y={size/2+11} textAnchor="middle" fill="#627d98" fontSize="8" fontFamily="DM Sans" letterSpacing=".08em">MATCH</text>
    </svg>
  );
}

              <div>
                <label className="block text-xs text-navy-300 mb-1.5 font-medium">Previous Surgeries <span className="text-navy-600">(optional)</span></label>
                <input type="text" value={info.prevSurg} onChange={e=>setInfo({...info,prevSurg:e.target.value})} placeholder="e.g. prior related procedures" className={inputCls}/>
              </div>
              <div>
                <label className="block text-xs text-navy-300 mb-1.5 font-medium">Current Medications <span className="text-navy-600">(optional)</span></label>
                <input type="text" value={info.meds} onChange={e=>setInfo({...info,meds:e.target.value})} placeholder="e.g. relevant current medications" className={inputCls}/>
              </div>
            </div>
            <div className="text-center mt-8">
              <button onClick={runMatch} className="px-8 py-3 rounded-xl bg-teal-600 hover:bg-teal-500 text-white font-semibold transition-all hover:shadow-lg hover:shadow-teal-900/30">
                Find My Surgeons →
              </button>
            </div>
          </div>
        )}

        {/* Step 5: Results */}
        {step===5&&(
          <div className="fu">
            <div className="text-center mb-2">
              <h2 className="font-display text-3xl text-white mb-1.5">Your Matches</h2>
              <p className="text-navy-400 text-sm">
                {sorted.length} surgeon{sorted.length!==1?'s':''} matched for <span className="text-teal-400 font-medium">{(SUBSPECIALTIES[specialty]||[]).find(s=>s.id===sub)?.label}</span>
                {info.state&&<> in <span className="text-teal-400 font-medium">{info.state}</span></>}
              </p>
            </div>
            {sorted.length>0&&sorted[0].procs&&(
              <div className="flex flex-wrap gap-2 justify-center mt-2 mb-6">
                <span className="text-[10px] text-navy-500">Likely procedures:</span>
                {sorted[0].procs.map(p=><span key={p.code} className="text-[10px] px-2.5 py-0.5 rounded-full bg-navy-800/80 text-teal-300 border border-navy-700/50">{p.name} · CPT {p.code}</span>)}
              </div>
            )}
            <div className="flex items-center gap-2 mb-5 flex-wrap">
              <span className="text-[10px] text-navy-500">Sort:</span>
              {[{k:'score',l:'Best Match'},{k:'volume',l:'Highest Volume'},{k:'comp',l:'Lowest Complications'},{k:'rating',l:'Top Rated'}].map(s=>(
                <button key={s.k} onClick={()=>setSortBy(s.k)}
                  className={`text-[11px] px-3 py-1.5 rounded-lg transition-all ${sortBy===s.k?'bg-teal-900/40 text-teal-300 border border-teal-700/50':'bg-navy-900/60 text-navy-400 border border-navy-800/50 hover:text-navy-200'}`}>{s.l}</button>
              ))}
            </div>
            {sorted.length>0?(
              <div className="space-y-4">{sorted.map((d,i)=><DoctorCard key={d.id} doc={d} i={i}/>)}</div>
            ):(
              <div className="text-center py-20"><div className="text-4xl mb-4 opacity-20">◎</div><p className="text-navy-400">No surgeons matched your criteria.</p><p className="text-navy-500 text-xs mt-1">Try broadening your state or symptom selection.</p></div>
            )}
          </div>
        )}
      </div>

      {/* Footer */}
      <footer className="max-w-4xl mx-auto mt-16 pt-6 border-t border-navy-800/40 text-center space-y-3 pb-8">
        <p className="text-[10px] text-navy-600 leading-relaxed max-w-2xl mx-auto">Surgeon data compiled from CMS Medicare Provider Utilization &amp; Payment Data, NPPES NPI Registry, and Medicare Care Compare. Complication rates calculated using ProPublica's published methodology applied to Medicare claims data.</p>
        <p className="text-[10px] text-navy-700">For informational purposes only. This is not medical advice. Always consult with a qualified healthcare provider.</p>
        <div className="flex items-center justify-center gap-4 text-[10px] text-navy-600">
          <span className="hover:text-teal-400 cursor-pointer transition-colors">About</span>
          <span className="text-navy-800">·</span>
          <span className="hover:text-teal-400 cursor-pointer transition-colors">Methodology</span>
          <span className="text-navy-800">·</span>
          <span className="hover:text-teal-400 cursor-pointer transition-colors">Data Sources</span>
          <span className="text-navy-800">·</span>
          <span className="hover:text-teal-400 cursor-pointer transition-colors">Privacy</span>
          <span className="text-navy-800">·</span>
          <span className="hover:text-teal-400 cursor-pointer transition-colors">Contact</span>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
